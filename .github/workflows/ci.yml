name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck repolens.sh lib/*.sh tests/*.sh ci/*.sh

  changelog:
    name: CHANGELOG touched
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG.md touched
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | bash ./ci/check-changelog-touched.sh

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run test suite
        run: make check
        env:
          GH_TOKEN: ${{ github.token }}

  docker-integration:
    name: Docker Integration (${{ matrix.suite }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: remote-deploy-e2e
            command: bash tests/test_remote_deploy_e2e.sh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run Docker integration suite
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPOLENS_TEST_DOCKER: 1
